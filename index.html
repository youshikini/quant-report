<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富婆的马 · 投资研究报告</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#060a10; color:#d0dce8; font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:radial-gradient(circle at 30% 30%, rgba(0,229,255,0.06) 0, transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(0,255,136,0.04) 0, transparent 50%),
      linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
    background-size:100% 100%,100% 100%,40px 40px,40px 40px; z-index:0;
  }
  .wrap { position:relative; z-index:1; text-align:center; padding:40px 20px; }
  .logo { font-size:14px; color:#00e5ff; font-family:'Courier New',monospace; letter-spacing:3px; margin-bottom:30px; }
  .h1 { font-size:clamp(28px,5vw,42px); font-weight:900; background:linear-gradient(135deg,#00e5ff,#00ff88); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:50px; }
  .cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .card {
    background:#0f1825; border:1px solid #1a2a40; border-radius:12px; padding:36px 28px; width:320px;
    text-decoration:none; transition:all 0.3s; text-align:left; position:relative; overflow:hidden;
  }
  .card:hover { border-color:rgba(0,229,255,0.4); box-shadow:0 0 40px rgba(0,229,255,0.08); transform:translateY(-3px); }
  .card .icon { font-size:32px; margin-bottom:16px; }
  .card .title { font-size:20px; font-weight:700; color:#fff; margin-bottom:8px; }
  .card .desc { font-size:13px; color:#5a7090; line-height:1.6; }
  .card .tag { display:inline-block; margin-top:16px; padding:4px 12px; border-radius:3px; font-size:11px; font-family:'Courier New',monospace; }
  .card.c1 { border-left:3px solid #00e5ff; }
  .card.c1 .tag { background:rgba(0,229,255,0.1); color:#00e5ff; border:1px solid rgba(0,229,255,0.25); }
  .card.c2 { border-left:3px solid #00ff88; }
  .card.c2 .tag { background:rgba(0,255,136,0.1); color:#00ff88; border:1px solid rgba(0,255,136,0.25); }
  .footer { margin-top:60px; color:#3a5060; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">INVESTMENT RESEARCH · 富婆的马</div>
  <h1 class="h1">投资研究报告</h1>
  <div class="cards">
    <a href="quant.html" class="card c1">
      <div class="icon">📊</div>
      <div class="title">量化产品全景报告</div>
      <div class="desc">国内百亿量化私募 + 国际巨头深度梳理，含幻方、九坤、Renaissance、Two Sigma等机构对比。</div>
      <div class="tag">量化私募 · 2026</div>
    </a>
    <a href="ai.html" class="card c2">
      <div class="icon">🤖</div>
      <div class="title">A股AI赛道全景报告</div>
      <div class="desc">8大AI核心赛道 × 头部上市公司，含AI芯片、光模块、服务器、AI应用等赛道财务数据。</div>
      <div class="tag">AI赛道 · 2026</div>
    </a>
  </div>
  <div class="footer">Made with ❤️ · 数据驱动 · 投资有风险 入市需谨慎</div>
</div>
</body>
</html>
